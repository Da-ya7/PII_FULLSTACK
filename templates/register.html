{% extends "base.html" %}
{% block title %}Register - PII Redaction System{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="text-center">
            <div class="auth-icon" style="background: var(--gradient-green);">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Get started with PII Redaction System</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Choose a username" required minlength="3" autocomplete="username">
                </div>
                <div class="form-text">Minimum 3 characters</div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" 
                           placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-text">Minimum 6 characters</div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">
                <i class="bi bi-check-circle me-1"></i> Create Account
            </button>
        </form>

        <hr class="auth-divider">
        <p class="text-center mb-0" style="font-size: 0.9rem;">
            Already have an account?
            <a href="{{ url_for('login') }}" class="auth-link">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
