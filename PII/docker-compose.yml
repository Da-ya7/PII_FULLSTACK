version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: privlock_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Zayahaya@1806
      MYSQL_DATABASE: privlock
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - privlock_network

  flask_app:
    build: .
    container_name: privlock_flask
    environment:
      FLASK_ENV: production
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: Zayahaya@1806
      MYSQL_DB: privlock
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    volumes:
      - ./uploads:/app/uploads
    networks:
      - privlock_network
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 app:app

volumes:
  mysql_data:

networks:
  privlock_network:
    driver: bridge
